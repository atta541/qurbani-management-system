services:
  db:
    image: postgres:16
    container_name: qurbani_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: qurbani
    ports:
      - "5432:5432"
    volumes:
      - qurbani_pg_data:/var/lib/postgresql/data

volumes:
  qurbani_pg_data:

